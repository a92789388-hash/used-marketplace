<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>중고마켓</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #ff6f0f;
      color: white;
      padding: 15px;
      font-size: 20px;
    }
    .container {
      padding: 20px;
    }
    .item {
      background: white;
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 10px;
      display: flex;
    }
    .item img {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      margin-right: 15px;
    }
    .price {
      color: #ff6f0f;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>🧡 중고마켓</header>

<div class="container">

  <div class="item">
    <img src="https://via.placeholder.com/120">
    <div>
      <h3>아이폰 13 판매</h3>
      <p class="price">500,000원</p>
      <p>서울 직거래 가능</p>
    </div>
  </div>

  <div class="item">
    <img src="https://via.placeholder.com/120">
    <div>
      <h3>노트북 판매</h3>
      <p class="price">300,000원</p>
      <p>상태 좋음</p>
    </div>
  </div>

</div>

</body>
</html>
