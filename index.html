<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>중고마켓</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #ff6f0f;
      color: white;
      padding: 15px;
      font-size: 24px;
      text-align: center;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 20px;
    }
    .item {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .price {
      color: #ff6f0f;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>🛒 중고마켓</header>

<div class="container">
  <div class="item">
    <h3>아이폰 13</h3>
    <p class="price">500,000원</p>
    <p>상태 좋아요</p>
  </div>

  <div class="item">
    <h3>노트북</h3>
    <p class="price">700,000원</p>
    <p>거의 새상품</p>
  </div>

  <div class="item">
    <h3>자전거</h3>
    <p class="price">150,000원</p>
    <p>사용감 있음</p>
  </div>
</div>

</body>
</html>
